<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Gesture Recognition – MediaPipe</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    h1 { font-size: 1.1rem; margin-bottom: 8px; }

    #container {
      position: relative;
      width: 640px;
      height: 480px;
    }

    video {
      /* Hidden – used only as input source for MediaPipe */
      display: none;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      border: 2px solid #444;
    }

    #gesture-label {
      margin-top: 12px;
      font-size: 1.6rem;
      background: #222;
      padding: 8px 24px;
      border-radius: 6px;
      min-width: 260px;
      text-align: center;
    }

    #status-label {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #aaa;
    }

    #instructions {
      margin-top: 16px;
      font-size: 0.75rem;
      color: #888;
      max-width: 640px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>MediaPipe Hand Gesture Recognition</h1>

  <div id="container">
    <!-- Hidden video – feeds frames into MediaPipe -->
    <video id="input-video" playsinline></video>
    <!-- Canvas – where the mirrored image and landmarks are drawn -->
    <canvas id="output-canvas" width="640" height="480"></canvas>
  </div>

  <div id="gesture-label">Gesture: –</div>
  <div id="status-label">Status: Loading scripts…</div>

  <div id="instructions">
    <strong>Gestures:</strong><br>
    Gesture 0 → Thumb tip touches Index finger tip<br>
    Gesture 1 → Thumb tip touches Middle finger tip<br>
    Gesture 2 → Thumb tip touches Ring finger tip<br>
    No gesture → fingers apart
  </div>

  <!--
    Scripts are placed at the BOTTOM of <body> so DOM elements above
    are guaranteed to exist before any script runs.

    Versions are pinned to the exact latest releases on npm:
      @mediapipe/drawing_utils  →  0.3.1675466124
      @mediapipe/hands          →  0.4.1675469240

    onerror shows a visible on-screen message if a CDN fetch fails.
  -->
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js"
    crossorigin="anonymous"
    onerror="document.getElementById('status-label').textContent='ERROR: drawing_utils.js failed to load from CDN.'">
  </script>
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"
    crossorigin="anonymous"
    onerror="document.getElementById('status-label').textContent='ERROR: hands.js failed to load from CDN.'">
  </script>

  <!-- Our logic – must come AFTER the MediaPipe scripts above -->
  <script src="camera_test.js"></script>
</body>
</html>
