<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Gesture Recognition – MediaPipe</title>

  <!-- ── MediaPipe Hands (CDN) ── -->
  <!-- Note: camera_utils is NOT used here. We use the native getUserMedia API
       in script.js instead, which works reliably on GitHub Pages. -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    /* Minimal layout – functional only */
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    h1 { font-size: 1.1rem; margin-bottom: 8px; }

    /* Stack the video (hidden) and canvas on top of each other */
    #container {
      position: relative;
      width: 640px;
      height: 480px;
    }

    video {
      /* The video feed is used only as input – hide it visually */
      display: none;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      border: 2px solid #444;
    }

    #gesture-label {
      margin-top: 12px;
      font-size: 1.6rem;
      background: #222;
      padding: 8px 24px;
      border-radius: 6px;
      min-width: 260px;
      text-align: center;
    }

    #instructions {
      margin-top: 16px;
      font-size: 0.75rem;
      color: #888;
      max-width: 640px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>MediaPipe Hand Gesture Recognition</h1>

  <div id="container">
    <!-- The webcam stream goes here (hidden – only used as input to MediaPipe) -->
    <video id="input-video" playsinline></video>

    <!-- All drawing (landmarks + connections) happens on this canvas -->
    <canvas id="output-canvas" width="640" height="480"></canvas>
  </div>

  <!-- Shows the detected gesture number in real time -->
  <div id="gesture-label">Gesture: –</div>

  <!-- Shows camera status (requesting / active / error) -->
  <div id="status-label">Status: Starting…</div>

  <div id="instructions">
    <strong>Gestures:</strong><br>
    Gesture 0 → Thumb tip touches Index finger tip<br>
    Gesture 1 → Thumb tip touches Middle finger tip<br>
    Gesture 2 → Thumb tip touches Ring finger tip<br>
    No gesture → fingers apart
  </div>

  <!-- Our main logic -->
  <script src="script.js"></script>
</body>
</html>
